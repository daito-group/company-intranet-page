<style>
  :root{
    --bg:#f5f7fa; --panel:#ffffff; --panel2:#eef3f9; --line:#e1e8f0;
    --text:#1f2a37; --muted:#6b7886; --accent:#2563eb; --accentd:#1d4ed8;
    --good:#15803d; --goodbg:#dcfce7;
    --bad:#dc2626;  --badbg:#fee2e2;
    --warn:#b45309; --warnbg:#fef3c7;
    --totbg:#eaf1ff;
    --shadow:0 1px 3px rgba(20,40,80,.06),0 1px 2px rgba(20,40,80,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI","Yu Gothic UI",Meiryo,system-ui,sans-serif;font-size:14px}
  /* ---- login gate ---- */
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  #login .box{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:28px 26px;width:min(92vw,380px);text-align:center}
  #login h2{margin:0 0 6px;font-size:18px;color:#13233a;font-weight:700}
  #login p{margin:0 0 18px;font-size:13px;color:var(--muted)}
  #login input{width:100%;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:12px;outline:none}
  #login input:focus{border-color:var(--accent)}
  #login button{width:100%;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:9px;padding:11px;cursor:pointer}
  #login button:disabled{opacity:.6;cursor:default}
  #login .err{color:var(--bad);font-size:12px;height:16px;margin-top:8px}
  .wrap{max-width:1400px;margin:0 auto;padding:14px 18px 60px}
  header.top{position:sticky;top:0;z-index:30;background:var(--bg);
    padding:8px 0 10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.4px;color:#13233a}
  h1 .sub{font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
  .monthpick{display:flex;align-items:center;gap:8px}
  .monthpick label{font-size:12px;color:var(--muted);font-weight:600}
  select#monthSel{font-size:14px;font-weight:600;color:var(--text);background:#fff;
    border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;box-shadow:var(--shadow)}
  .marrow{font-size:13px;line-height:1;color:var(--text);background:#fff;border:1px solid var(--line);
    border-radius:8px;width:32px;height:34px;cursor:pointer;box-shadow:var(--shadow);
    display:inline-flex;align-items:center;justify-content:center;padding:0;user-select:none}
  .marrow:hover:not(:disabled){background:#f1f5fb}
  .marrow:disabled{opacity:.35;cursor:default}
  .spacer{flex:1}
  .meta{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}
  nav.tabs{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 14px}
  nav.tabs button{background:#fff;color:var(--muted);border:1px solid var(--line);
    border-radius:9px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:600;transition:.12s;box-shadow:var(--shadow)}
  nav.tabs button:hover{color:var(--accentd);border-color:#bcd0ee}
  nav.tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:baseline;gap:12px;padding:14px 16px 10px}
  .card-h .nm{font-size:16px;font-weight:700;color:#13233a}
  .card-h .mn{font-size:12px;color:var(--muted)}
  .tblwrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;min-width:780px}
  thead th{background:var(--panel2);color:var(--muted);font-weight:600;
    font-size:12px;padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th.l{text-align:left}
  tbody td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td.l{text-align:left;font-weight:600;color:#22303f}
  tbody tr:hover{background:#f7faff}
  tr.total td{background:var(--totbg);font-weight:700;border-top:2px solid var(--accent)}
  tr.total td.l{color:var(--accentd)}
  .pos{color:var(--good)} .neg{color:var(--bad)}
  .chip{display:inline-block;min-width:54px;padding:3px 9px;border-radius:7px;font-weight:700;font-size:13px}
  .chip.good{background:var(--goodbg);color:var(--good)}
  .chip.bad{background:var(--badbg);color:var(--bad)}
  .chip.warn{background:var(--warnbg);color:var(--warn)}
  .muted{color:var(--muted)}
  .notes{margin-top:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .note{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
  .note h3{margin:0 0 8px;font-size:13px;color:var(--accentd);display:flex;align-items:center;gap:8px}
  .note .edit{min-height:90px;outline:none;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fcfdff}
  .note .edit:focus{border-color:var(--accent)}
  .note .edit:empty:before{content:attr(data-ph);color:#aab6c4}
  .note .saved{font-size:10px;color:var(--good);margin-top:6px;height:12px}
  footer{margin-top:24px;color:var(--muted);font-size:11px;text-align:center;line-height:1.6}
  @media print{
    header.top,nav.tabs{position:static}
    .card,.note,nav.tabs button,select#monthSel{box-shadow:none}
  }
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <h2>月次PL会議ダッシュボード</h2>
    <p>閲覧にはパスワードが必要です</p>
    <form id="loginForm">
      <input type="password" id="pw" placeholder="パスワード" autocomplete="current-password" autofocus>
      <button type="submit" id="loginBtn">開く</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>
</div>

<div class="wrap" style="display:none">
  <header class="top">
    <h1>月次PL会議ダッシュボード<span class="sub" id="subTitle"></span></h1>
    <div class="monthpick"><label for="monthSel">対象月</label><button type="button" id="monthPrev" class="marrow" title="前の月">◀</button><select id="monthSel"></select><button type="button" id="monthNext" class="marrow" title="次の月">▶</button></div>
    <div class="spacer"></div>
    <div class="meta" id="meta"></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <div id="view"></div>
  <footer id="foot"></footer>
</div>

// ---------- password decryption (AES-CBC + PBKDF2-SHA256, matches the generator) ----------
function b64ToBuf(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u.buffer; }
async function decryptData(pw){
  const salt=b64ToBuf(ENC.salt), iv=b64ToBuf(ENC.iv), ct=b64ToBuf(ENC.ct);
  const base=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), {name:'PBKDF2'}, false, ['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:ENC.iterations, hash:'SHA-256'}, base, {name:'AES-CBC', length:256}, false, ['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC', iv}, key, ct);
  return new TextDecoder().decode(pt);
}

// ---------- comment store: shared cloud (Firebase) or this-PC-only (localStorage) ----------
const Notes = (function(){
  const cfg = (FBCONFIG && FBCONFIG.databaseURL) ? FBCONFIG : null;
  let db = null, mode = 'local';
  if(cfg && typeof firebase !== 'undefined'){
    try{ firebase.initializeApp(cfg); db = firebase.database(); mode = 'cloud'; }
    catch(e){ console.warn('Firebase init failed, using local storage', e); mode = 'local'; }
  }
  function path(key){ return 'comments/' + String(key).replace(/[.#$\[\]\/]/g,'_'); }
  return {
    mode: mode,
    get(key, cb){
      if(mode==='cloud'){ db.ref(path(key)).once('value').then(s=>cb(s.val()||'')).catch(()=>cb(localStorage.getItem(key)||'')); }
      else { cb(localStorage.getItem(key)||''); }
    },
    set(key, val){
      if(mode==='cloud'){ db.ref(path(key)).set(val); }
      localStorage.setItem(key, val);
    },
    subscribe(key, cb){
      if(mode==='cloud'){ const r=db.ref(path(key)); const h=r.on('value',s=>cb(s.val()||'')); return ()=>r.off('value',h); }
      return ()=>{};
    }
  };
})();

// ---------- formatting ----------
function yen(v){ if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  return Math.round(v).toLocaleString('ja-JP'); }
function pct(v){ if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  return (v*100).toFixed(1)+'%'; }
function ratioChip(v){
  if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  let cls = v>=1?'good':(v>=0.95?'warn':'bad');
  return '<span class="chip '+cls+'">'+(v*100).toFixed(1)+'%</span>';
}
function profitCell(v){ if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  let c = v<0?'neg':'pos'; return '<span class="'+c+'">'+Math.round(v).toLocaleString('ja-JP')+'</span>'; }
function costChip(v){ if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  let cls = v>=0.45?'bad':(v>=0.42?'warn':''); return '<span class="chip '+cls+'">'+(v*100).toFixed(1)+'%</span>'; }
function profRatio(v){ if(v===null||v===undefined||isNaN(v)) return '<span class="muted">—</span>';
  return '<span class="'+(v<0?'neg':'')+'">'+(v*100).toFixed(1)+'%</span>'; }

const COLS = ['売上高','予算','達成率','昨年比','原価率','人件費率','営業利益','利益率'];
function rowCells(r){
  return '<td>'+yen(r.uri)+'</td>'
       + '<td>'+yen(r.yosan)+'</td>'
       + '<td>'+ratioChip(r.tassei)+'</td>'
       + '<td>'+ratioChip(r.zennenhi)+'</td>'
       + '<td>'+costChip(r.genka_ritsu)+'</td>'
       + '<td>'+pct(r.jin_ritsu)+'</td>'
       + '<td>'+profitCell(r.eigyo)+'</td>'
       + '<td>'+profRatio(r.rieki_ritsu)+'</td>';
}
function tableHTML(rows, total, totalLabel){
  let h = '<div class="tblwrap"><table><thead><tr><th class="l">店舗</th>';
  for(const c of COLS) h += '<th>'+c+'</th>';
  h += '</tr></thead><tbody>';
  for(const r of rows) h += '<tr><td class="l">'+r.name+'</td>'+rowCells(r)+'</tr>';
  if(total) h += '<tr class="total"><td class="l">'+totalLabel+'</td>'+rowCells(total)+'</tr>';
  h += '</tbody></table></div>';
  return h;
}

// ---------- notes ----------
function noteBlock(scopeKey){
  const defs = [
    ['issue','▼ 確認できた課題','店舗ごとの課題を入力…'],
    ['action','▼ 売上向上のために行う取り組み','取り組み・改善計画を入力…'],
    ['staff','▼ 人員の過不足','人員状況を入力…']
  ];
  let h = '<div class="notes">';
  for(const [k,title,ph] of defs){
    const id = 'note_'+curMonth+'_'+scopeKey+'_'+k;
    h += '<div class="note"><h3>'+title+'</h3>'
      +  '<div class="edit" contenteditable="true" data-ph="'+ph+'" data-key="'+id+'"></div>'
      +  '<div class="saved" id="sv_'+id+'"></div></div>';
  }
  h += '</div>';
  return h;
}
function hydrateNotes(){
  (window._noteSubs||[]).forEach(u=>{ try{ u&&u(); }catch(e){} });
  window._noteSubs = [];
  document.querySelectorAll('.edit').forEach(el=>{
    const key = el.dataset.key;
    Notes.get(key, v=>{ if(document.activeElement!==el) el.innerText = v; });
    el.addEventListener('input',()=>{
      Notes.set(key, el.innerText);
      const sv = document.getElementById('sv_'+key);
      if(sv){ sv.textContent = (Notes.mode==='cloud'?'共有に保存しました ✓':'保存しました ✓'); clearTimeout(el._t); el._t=setTimeout(()=>sv.textContent='',1400); }
    });
    const unsub = Notes.subscribe(key, v=>{ if(document.activeElement!==el && el.innerText!==v) el.innerText = v; });
    window._noteSubs.push(unsub);
  });
}

// ---------- render ----------
function monthLabel(key){ const m = DATA.months.find(x=>x.key===key); return m?(m.full||m.label):key; }
function render(){
  const period = DATA.periods[curMonth];
  document.getElementById('subTitle').textContent = '／ '+monthLabel(curMonth);
  const tab = tabsList[curTab];
  let html = '';
  if(!period){
    html = '<div class="card"><div class="card-h"><span class="nm">データなし</span></div></div>';
  } else if(tab.key==='company'){
    const c = period.company;
    const crows = c.rows.map(r=>({...r, name: r.name + '事業部'}));
    html += '<div class="card"><div class="card-h"><span class="nm">全社サマリー</span>'
          + '<span class="mn">'+monthLabel(curMonth)+'</span></div>'
          + tableHTML(crows, c.soukei, '全社 合計') + '</div>';
    html += noteBlock('company');
  } else {
    const d  = DATA.divisions[tab.key];
    const dd = period.divisions[d.id];
    html += '<div class="card"><div class="card-h"><span class="nm">'+d.name+'</span>'
          + '<span class="mn">'+monthLabel(curMonth)+'</span></div>'
          + tableHTML(dd.stores, dd.total, d.short+' 事業部 合計') + '</div>';
    html += noteBlock(d.id);
  }
  document.getElementById('view').innerHTML = html;
  hydrateNotes();
  document.querySelectorAll('nav.tabs button').forEach((b,i)=>b.classList.toggle('on',i===curTab));
}

function build(){
  curMonth = DATA.defaultMonth;
  tabsList = [{key:'company',label:'全社'}];
  DATA.divisions.forEach((d,i)=>tabsList.push({key:i,label:d.short}));
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabsList.map(t=>'<button>'+t.label+'</button>').join('');
  tabsEl.querySelectorAll('button').forEach((b,i)=>b.onclick=()=>{curTab=i;render();});
  const sel = document.getElementById('monthSel');
  const fys = [...new Set(DATA.months.map(m=>m.fy))].sort((a,b)=>b-a);
  let html='';
  for(const fy of fys){
    const items = DATA.months.filter(m=>m.fy===fy).sort((a,b)=>(b.ord||0)-(a.ord||0));
    if(!items.length) continue;
    html += '<optgroup label="'+fy+'年度">';
    html += items.map(m=>'<option value="'+m.key+'"'+(m.key===curMonth?' selected':'')+'>'+m.label+'</option>').join('');
    html += '</optgroup>';
  }
  sel.innerHTML = html;
  sel.value = curMonth;
  // 時系列順（古い→新しい）の「実月」キー配列。矢印は月単位で移動（四半期・半期・通期は除外）。
  monthOrder = DATA.months.slice().filter(m=>/^\d{6}$/.test(m.key))
    .sort((a,b)=> (a.fy-b.fy) || ((a.ord||0)-(b.ord||0))).map(m=>m.key);
  const prevBtn = document.getElementById('monthPrev');
  const nextBtn = document.getElementById('monthNext');
  function setMonth(key){ curMonth = key; sel.value = key; updateArrows(); render(); }
  function updateArrows(){
    const i = monthOrder.indexOf(curMonth);
    prevBtn.disabled = (i<=0);
    nextBtn.disabled = (i<0 || i>=monthOrder.length-1);
  }
  sel.onchange = ()=>{ setMonth(sel.value); };
  prevBtn.onclick = ()=>{ const i=monthOrder.indexOf(curMonth); if(i>0) setMonth(monthOrder[i-1]); };
  nextBtn.onclick = ()=>{ const i=monthOrder.indexOf(curMonth); if(i>=0 && i<monthOrder.length-1) setMonth(monthOrder[i+1]); };
  updateArrows();
  const share = (Notes.mode==='cloud')
    ? '<span style="color:var(--good);font-weight:700">● コメント共有: ON（全PCで同期）</span>'
    : '<span style="color:var(--muted)">○ コメント共有: OFF（このPCのみ）</span>';
  document.getElementById('meta').innerHTML = share+'<br>元データ: '+DATA.sourceFile+'　生成: '+DATA.generatedAt;
  document.getElementById('foot').textContent =
    '※ 達成率・昨年比・各種比率は実績/予算・前年同月比から算出。BI/FB/製造の合計は公式合計（BIはすき焼き抜き）、鳥辰/BDは所属店舗の単純合算。全社合計は純売上高ベース。コメントは対象月ごとに保存されます。';
  render();
}

// ---------- login gate ----------
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = '確認中…'; err.textContent = '';
  try{
    const json = await decryptData(pw);
    DATA = JSON.parse(json);
    document.getElementById('login').style.display = 'none';
    document.querySelector('.wrap').style.display = '';
    build();
  }catch(ex){
    err.textContent = 'パスワードが違います';
    btn.disabled = false; btn.textContent = '開く';
    document.getElementById('pw').select();
  }
});
</script>
