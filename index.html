<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内イントラサイト</title>
<style>
  :root {
    --main-color: #2c3e50;
    --accent-color: #3498db;
    --bg-color: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
  }
  header {
    background-color: var(--main-color);
    padding: 24px 0;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  header img {
    max-height: 80px;
    height: auto;
  }
  main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }
  h2 {
    font-size: 18px;
    color: var(--main-color);
    border-left: 5px solid var(--accent-color);
    padding-left: 10px;
    margin: 36px 0 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .card {
    background-color: var(--card-bg);
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    text-decoration: none;
    color: var(--text-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .card.disabled {
    color: #999;
    cursor: default;
    pointer-events: none;
    background-color: #f0f0f0;
  }
  .card .label {
    font-size: 15px;
    font-weight: 600;
  }
  .card .badge {
    font-size: 11px;
    background-color: var(--accent-color);
    color: #fff;
    border-radius: 4px;
    padding: 2px 8px;
    margin-left: 8px;
    white-space: nowrap;
  }
  .card.disabled .badge {
    background-color: #bbb;
  }
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: #999;
  }
  #lock-screen {
    position: fixed;
    inset: 0;
    background-color: var(--main-color);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  #lock-box {
    background-color: #fff;
    border-radius: 10px;
    padding: 36px 32px;
    width: 90%;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #lock-box img {
    max-height: 60px;
    margin-bottom: 20px;
  }
  #lock-box input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-bottom: 12px;
  }
  #lock-box button {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    background-color: var(--accent-color);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  #lock-box button:hover {
    background-color: #2980b9;
  }
  #lock-error {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 10px;
    min-height: 16px;
  }
  body.locked > header,
  body.locked > main,
  body.locked > footer {
    display: none;
  }
</style>
</head>
<body class="locked">

<div id="lock-screen">
  <div id="lock-box">
    <img src="yoko_RGB.png" alt="会社ロゴ">
    <form id="lock-form">
      <input type="password" id="lock-password" placeholder="パスワードを入力" autocomplete="current-password" autofocus>
      <button type="submit">入室する</button>
      <div id="lock-error"></div>
    </form>
  </div>
</div>

<header>
  <img src="yoko_RGB.png" alt="会社ロゴ">
</header>

<main>

  <h2>業務システム</h2>
  <div class="grid">
    <a class="card" href="https://team-schedule.onrender.com/login.html" target="_blank" rel="noopener noreferrer">
      <span class="label">スケジュール</span>
    </a>
    <a class="card" href="https://www.infomart.co.jp/scripts/logon.asp" target="_blank" rel="noopener noreferrer">
      <span class="label">インフォマート</span>
    </a>
    <a class="card" href="https://www.cms.hotpepper.jp/CLN/login/" target="_blank" rel="noopener noreferrer">
      <span class="label">ホットペッパー管理画面</span>
    </a>
    <a class="card" href="https://admin.thebase.com/users/login" target="_blank" rel="noopener noreferrer">
      <span class="label">BASE管理画面</span>
    </a>
    <a class="card disabled">
      <span class="label">出張申請・報告</span>
      <span class="badge">準備中</span>
    </a>
    <a class="card disabled">
      <span class="label">日報報告</span>
      <span class="badge">準備中</span>
    </a>
  </div>

  <h2>▼福利厚生</h2>
  <div class="grid">
    <a class="card disabled">
      <span class="label">エスコンチケット申し込み</span>
      <span class="badge">準備中</span>
    </a>
    <a class="card disabled">
      <span class="label">サツドラ 5％OFF登録方法</span>
    </a>
    <a class="card disabled">
      <span class="label">スタッフ割チケット</span>
    </a>
  </div>

</main>

<footer>
  &copy; 2026 社内イントラサイト
</footer>

<script>
(function () {
  var STORAGE_KEY = "intranet_auth_v1";
  var PASSWORD_HASH = "c2a4885469c5457da86f6246a7fc5ca6b77aac45d4b4bf6e98b8cb8bff5449cf";

  function sha256(text) {
    var data = new TextEncoder().encode(text);
    return crypto.subtle.digest("SHA-256", data).then(function (buf) {
      return Array.prototype.map
        .call(new Uint8Array(buf), function (b) { return b.toString(16).padStart(2, "0"); })
        .join("");
    });
  }

  function unlock() {
    document.body.classList.remove("locked");
    document.getElementById("lock-screen").remove();
  }

  if (localStorage.getItem(STORAGE_KEY) === PASSWORD_HASH) {
    unlock();
    return;
  }

  document.getElementById("lock-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var input = document.getElementById("lock-password").value;
    sha256(input).then(function (hash) {
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(STORAGE_KEY, hash);
        unlock();
      } else {
        document.getElementById("lock-error").textContent = "パスワードが違います";
      }
    });
  });
})();
</script>

</body>
</html>
